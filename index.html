<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>AI Pulse Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: rgba(255,255,255,0.07);
      --accent: #6effc8;
      --accent2: #ff6b6b;
      --text: #e8e8f0;
      --muted: #6b6b7e;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: env(safe-area-inset-top, 0px) 20px 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 8px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.3px;
      color: var(--text);
      line-height: 1.1;
    }

    .logo-text span {
      color: var(--muted);
      display: block;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .refresh-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:active {
      background: var(--surface2);
      color: var(--accent);
      transform: scale(0.92);
    }

    .refresh-btn.spinning svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0f;
      font-weight: 600;
    }

    .filter-pill:not(.active):active {
      background: var(--surface2);
      color: var(--text);
    }

    /* Main content */
    main {
      padding: 20px 16px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .status-count {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .last-update {
      font-size: 12px;
      color: var(--muted);
    }

    /* Cards */
    .news-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      text-decoration: none;
      display: block;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      animation: fadeIn 0.3s ease both;
    }

    .card:active {
      transform: scale(0.98);
      background: var(--surface2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--surface2);
    }

    .card-image-placeholder {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, var(--surface2), #1e1e28);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-image-placeholder svg {
      opacity: 0.15;
    }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .source-badge {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(110,255,200,0.1);
      padding: 3px 8px;
      border-radius: 4px;
    }

    .card-time {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.2px;
    }

    .card-summary {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Featured card (first item) */
    .card.featured .card-title {
      font-size: 20px;
    }

    .card.featured .card-image {
      height: 220px;
    }

    /* Skeleton loader */
    .skeleton-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .skeleton-img {
      width: 100%;
      height: 140px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    .skeleton-body { padding: 14px 16px; }

    .skeleton-line {
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 10px;
    }

    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Error state */
    .error-state {
      text-align: center;
      padding: 60px 20px;
    }

    .error-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .error-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .error-msg {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .pulse-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 auto 20px;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(110,255,200,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(110,255,200,0); }
    }
  </style>
</head>

<script>
  // ─── CONFIG ───────────────────────────────────────────────
  const WEBHOOK_URL = 'https://TU-N8N.com/webhook/ai-news'; // Reemplazar
  const API_KEY     = 'REEMPLAZA_CON_TU_CLAVE_SECRETA';     // Igual que en n8n
  const CACHE_KEY   = 'ainews_cache';
  const CACHE_TTL   = 15 * 60 * 1000; // 15 min
  // ──────────────────────────────────────────────────────────

  let allNews = [];
  let activeFilter = 'all';

  // Source name map
  const sourceNames = {
    xataka: 'Xataka',
    hipertextual: 'Hipertextual',
    genbeta: 'Genbeta',
    techcrunch: 'TechCrunch',
    venturebeat: 'VentureBeat',
    technologyreview: 'MIT Review',
    huggingface: 'HuggingFace',
  };

  function getSourceName(sourceUrl) {
    if (!sourceUrl) return 'IA';
    const url = sourceUrl.toLowerCase();
    for (const [key, name] of Object.entries(sourceNames)) {
      if (url.includes(key)) return name;
    }
    return 'IA';
  }

  function getSourceKey(sourceUrl) {
    if (!sourceUrl) return 'other';
    const url = sourceUrl.toLowerCase();
    for (const key of Object.keys(sourceNames)) {
      if (url.includes(key)) return key;
    }
    return 'other';
  }

  function timeAgo(dateStr) {
    const date = new Date(dateStr);
    const diff = Math.floor((Date.now() - date) / 1000);
    if (diff < 60) return 'ahora';
    if (diff < 3600) return `${Math.floor(diff/60)}m`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h`;
    return `${Math.floor(diff/86400)}d`;
  }

  function renderCards(news) {
    const list = document.getElementById('newsList');
    if (!news.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="pulse-dot"></div>
          <div class="error-title">Sin noticias aún</div>
          <div class="error-msg">El workflow de n8n todavía no ha<br>recopilado artículos. Vuelve en 2h.</div>
        </div>`;
      return;
    }

    list.innerHTML = news.map((item, i) => {
      const isFeatured = i === 0 && activeFilter === 'all';
      const sourceName = getSourceName(item.source);
      const time = timeAgo(item.published_at);
      const hasImage = item.image_url && item.image_url !== 'null';

      return `
        <a class="card${isFeatured ? ' featured' : ''}" href="${item.url}" target="_blank" rel="noopener noreferrer" style="animation-delay: ${i * 40}ms">
          ${hasImage
            ? `<img class="card-image" src="${item.image_url}" alt="" loading="lazy" onerror="this.style.display='none'">`
            : isFeatured ? `<div class="card-image-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
                  <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
                </svg>
              </div>` : ''}
          <div class="card-body">
            <div class="card-meta">
              <span class="source-badge">${sourceName}</span>
              <span class="card-time">${time}</span>
            </div>
            <div class="card-title">${item.title}</div>
            ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ''}
          </div>
        </a>`;
    }).join('');
  }

  function applyFilter(filter) {
    activeFilter = filter;
    const filtered = filter === 'all'
      ? allNews
      : allNews.filter(n => getSourceKey(n.source) === filter);
    
    document.getElementById('statusCount').textContent =
      `${filtered.length} noticia${filtered.length !== 1 ? 's' : ''}`;
    renderCards(filtered);
  }

  // Filter pills
  document.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.filter);
    });
  });

  async function loadNews(forceRefresh = false) {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    // Check cache
    if (!forceRefresh) {
      try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
        if (cached.ts && Date.now() - cached.ts < CACHE_TTL && cached.data?.length) {
          allNews = cached.data;
          applyFilter(activeFilter);
          document.getElementById('lastUpdate').textContent = 'caché';
          btn.classList.remove('spinning');
          return;
        }
      } catch(e) {}
    }

    try {
      const res = await fetch(WEBHOOK_URL, {
        headers: { 'X-API-Key': API_KEY }
      });

      if (res.status === 401) {
        throw new Error('API Key inválida. Revisa la configuración.');
      }

      if (!res.ok) throw new Error(`Error ${res.status}`);

      const payload = await res.json();
      allNews = payload.data || [];

      // Save cache
      localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: allNews }));

      applyFilter(activeFilter);
      document.getElementById('lastUpdate').textContent = 'actualizado';

    } catch (err) {
      const list = document.getElementById('newsList');
      
      // Show cached data if available, even if stale
      if (allNews.length) {
        document.getElementById('lastUpdate').textContent = 'sin conexión';
      } else {
        list.innerHTML = `
          <div class="error-state">
            <div class="error-icon">⚡</div>
            <div class="error-title">No se pudo conectar</div>
            <div class="error-msg">${err.message}<br><br>Verifica que el webhook de n8n<br>esté activo y la URL sea correcta.</div>
          </div>`;
        document.getElementById('statusCount').textContent = 'Error';
      }
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // Init
  loadNews();

  // Auto-refresh cada 30 min si la app está en foco
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadNews();
  });
</script>
</body>
</html>
